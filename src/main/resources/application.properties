# ⚡ Bolt: Enable Hibernate second-level cache for better performance
quarkus.hibernate-orm.second-level-caching-enabled=true

# ⚡ Bolt: Enable HTTP response compression to reduce payload size over the network
quarkus.http.enable-compression=true
quarkus.http.header."X-Content-Type-Options".value=nosniff
quarkus.http.header."X-XSS-Protection".value=1; mode=block
quarkus.http.header."X-Frame-Options".value=DENY
quarkus.http.header."Strict-Transport-Security".value=max-age=31536000; includeSubDomains
quarkus.http.header."Content-Security-Policy".value=default-src 'self'
quarkus.http.header."Referrer-Policy".value=strict-origin-when-cross-origin
quarkus.http.header."Content-Security-Policy".value=default-src 'self'; frame-ancestors 'none';

# ⚡ Bolt: Enable JDBC statement batching to reduce network roundtrips for bulk inserts/updates
quarkus.hibernate-orm.jdbc.statement-batch-size=50

# ⚡ Bolt: Enable batch fetching to avoid N+1 query problems and improve performance when loading collections
quarkus.hibernate-orm.fetch.batch-size=50

# SECURITY: Enforce read timeout to mitigate Slowloris Denial of Service (DoS) attacks
quarkus.http.read-timeout=10s
# SECURITY: Limit HTTP request body size to prevent resource exhaustion (DoS) from excessively large payloads
quarkus.http.limits.max-body-size=256K

# SECURITY: Enable HTTP access logging for security auditing and incident response
quarkus.http.access-log.enabled=true
